# ============================================
# Docker Compose - Development
# ============================================
#
# Usage:
#   docker compose up -d
#
# Features:
#   - Hot-reload for backend (uvicorn --reload)
#   - Hot-reload for frontend (Vite dev server)
#   - Volume mounting for live code changes
#   - Development environment variables
# ============================================

services:
  # ===========================================
  # Backend API (Development)
  # ===========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://boilerplate:boilerplate@db:5432/boilerplate
      - REDIS_URL=redis://:devpassword@redis:6379/0
      - REDIS_HOST=redis
      - REDIS_PASSWORD=devpassword
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-this-in-production-with-strong-secret-key-min-32-chars}
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=15
      - REFRESH_TOKEN_EXPIRE_DAYS=7
      - ENVIRONMENT=development
      - FRONTEND_URL=http://localhost:3000
      - DEBUG=true
      - RATE_LIMIT_ENABLED=false
      - AUTH_COOKIE_SECURE=false
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-dev-only-encryption-key-change-in-production-min-32-chars}
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --timeout-keep-alive 75
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
          pids: 200

  # ===========================================
  # Nginx Reverse Proxy (Development)
  # ===========================================
  nginx:
    image: nginx:1.29-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    volumes:
      - ./frontend/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - vite
      - backend
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:80/"]
      interval: 10s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
          pids: 100

  # ===========================================
  # Frontend Vite Dev Server (Internal)
  # ===========================================
  vite:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    expose:
      - "5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:5173/"]
      interval: 10s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
          pids: 100

  # ===========================================
  # Database (PostgreSQL 17)
  # ===========================================
  db:
    image: postgres:17.7-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=boilerplate
      - POSTGRES_PASSWORD=boilerplate
      - POSTGRES_DB=boilerplate
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/alembic/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boilerplate"]
      interval: 5s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
          pids: 200

  # ===========================================
  # Cache (Redis)
  # ===========================================
  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: redis-server --requirepass devpassword
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        ["CMD", "redis-cli", "-a", "devpassword", "--no-auth-warning", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
          pids: 100

  # ===========================================
  # Observability (Optional - dev)
  # ===========================================
  jaeger:
    image: jaegertracing/all-in-one:1.65.0
    ports:
      - "127.0.0.1:16686:16686" # UI
      - "127.0.0.1:4317:4317" # OTLP gRPC
    profiles:
      - observability
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:14269/"]
      interval: 10s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
          pids: 200

volumes:
  postgres_data:
  redis_data:
