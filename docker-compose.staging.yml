# ============================================
# Docker Compose - Staging
# ============================================
#
# Usage:
#   docker compose -f docker-compose.staging.yml up -d --build
#
# Differences from production:
#   - Debug logs enabled
#   - Swagger/ReDoc exposed
#   - Relaxed resource limits
#   - Uses 'boilerplate' DB user (owner) for easier debugging
#   - Backend accessible via nginx only (expose, not ports)
# ============================================

services:
  # ===========================================
  # Backend API (Staging)
  # ===========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: staging-backend
    restart: unless-stopped
    stop_grace_period: 30s
    environment:
      # SECURITY: Use app_user for RLS enforcement even in staging.
      # Switch to 'boilerplate' (DB owner) only for debugging RLS issues.
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://app_user:${APP_USER_PASSWORD:?APP_USER_PASSWORD must be set}@db:5432/boilerplate}
      - REDIS_URL=${REDIS_URL:-redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379/0}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set}
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=15
      - REFRESH_TOKEN_EXPIRE_DAYS=7
      - ENVIRONMENT=staging
      - DEBUG=false
      - LOG_LEVEL=DEBUG
      - FRONTEND_URL=${FRONTEND_URL:?FRONTEND_URL must be set}
      - AUTH_COOKIE_SECURE=${AUTH_COOKIE_SECURE:-true}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:?ENCRYPTION_KEY must be set}
      - RATE_LIMIT_ENABLED=true
      - CSRF_ENABLED=true
    expose:
      - "8000"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    pids_limit: 200
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - staging-frontend
      - staging-backend
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G

  # ===========================================
  # Frontend (Nginx - Staging)
  # ===========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: staging-frontend
    restart: unless-stopped
    stop_grace_period: 15s
    # NOTE: Restrict to 127.0.0.1:80:80 if behind a load balancer.
    ports:
      - "${FRONTEND_BIND:-0.0.0.0}:80:80"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    pids_limit: 100
    tmpfs:
      - /tmp:size=32m,noexec,nosuid,nodev
      - /var/cache/nginx:size=128m,noexec,nosuid,nodev
      - /var/run:size=8m,noexec,nosuid,nodev
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3
    networks:
      - staging-frontend
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ===========================================
  # PostgreSQL Database
  # ===========================================
  db:
    image: postgres:17.7-alpine
    container_name: staging-db
    restart: unless-stopped
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 200
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-boilerplate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-boilerplate}
      APP_USER_PASSWORD: ${APP_USER_PASSWORD:?APP_USER_PASSWORD must be set}
    volumes:
      - staging_postgres_data:/var/lib/postgresql/data
      - ./backend/alembic/init_prod.sh:/docker-entrypoint-initdb.d/init_prod.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-boilerplate}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - staging-backend
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  # ===========================================
  # Redis Cache
  # ===========================================
  redis:
    image: redis:7.4-alpine
    container_name: staging-redis
    restart: unless-stopped
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 100
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    volumes:
      - staging_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD} --no-auth-warning ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - staging-backend
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

networks:
  staging-frontend:
    driver: bridge
  staging-backend:
    driver: bridge
    internal: true

volumes:
  staging_postgres_data:
  staging_redis_data:
