# ============================================
# Docker Compose - Testing
# ============================================
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d
#   docker compose -f docker-compose.test.yml down
#
# Purpose:
#   - Isolated PostgreSQL for integration tests
#   - Matches production schema exactly
#   - Supports RLS, JSONB, ARRAY types
# ============================================

services:
  # ===========================================
  # PostgreSQL Test Database
  # ===========================================
  test_db:
    image: postgres:17-alpine
    container_name: fastapi-boilerplate-test-db
    ports:
      - "5433:5432"  # Different port to avoid conflict with dev DB
    environment:
      - POSTGRES_USER=test_user
      - POSTGRES_PASSWORD=test_password
      - POSTGRES_DB=test_boilerplate
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - test_db_data:/var/lib/postgresql/data
      - ./backend/alembic/init_test.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d test_boilerplate"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ===========================================
  # Redis Test Cache (Optional)
  # ===========================================
  test_redis:
    image: redis:7-alpine
    container_name: fastapi-boilerplate-test-redis
    ports:
      - "6380:6379"  # Different port to avoid conflict with dev Redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  test_db_data:
    name: fastapi-boilerplate-test-db-data
