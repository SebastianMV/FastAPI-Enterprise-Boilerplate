# ============================================
# Docker Compose - Testing
# ============================================
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d
#   docker compose -f docker-compose.test.yml down
#
# Purpose:
#   - Isolated PostgreSQL for integration tests
#   - Matches production schema exactly
#   - Supports RLS, JSONB, ARRAY types
# ============================================

services:
  # ===========================================
  # PostgreSQL Test Database
  # ===========================================
  test_db:
    image: postgres:17.7-alpine
    container_name: fastapi-boilerplate-test-db
    restart: "no"
    ports:
      - "127.0.0.1:5433:5432" # Different port to avoid conflict with dev DB
    environment:
      - POSTGRES_USER=test_user
      - POSTGRES_PASSWORD=test_password
      - POSTGRES_DB=test_boilerplate
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - ./backend/alembic/init_test.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d test_boilerplate"]
      interval: 5s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"
    networks:
      - test-backend

  # ===========================================
  # Redis Test Cache (Optional)
  # ===========================================
  test_redis:
    image: redis:7.4-alpine
    container_name: fastapi-boilerplate-test-redis
    restart: "no"
    command: redis-server --requirepass devpassword
    ports:
      - "127.0.0.1:6380:6379" # Different port to avoid conflict with dev Redis
    healthcheck:
      test:
        ["CMD", "redis-cli", "-a", "devpassword", "--no-auth-warning", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"
    networks:
      - test-backend

# No persistent volumes needed - test DB uses tmpfs for speed

networks:
  test-backend:
    driver: bridge
