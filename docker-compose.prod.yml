# ============================================
# Docker Compose - Production
# ============================================
# 
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Features:
#   - Multi-stage optimized builds
#   - Nginx serving static frontend
#   - Production-ready uvicorn workers
#   - Resource limits and healthchecks
#   - Non-root users for security
# ============================================

services:
  # ===========================================
  # Backend API (Production)
  # ===========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: boilerplate-backend
    restart: unless-stopped
    environment:
      # SECURITY: Use app_user (non-owner) for RLS enforcement in production
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://app_user:app_password@db:5432/boilerplate}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=15
      - REFRESH_TOKEN_EXPIRE_DAYS=7
      - ENVIRONMENT=production
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - boilerplate-network
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M

  # ===========================================
  # Frontend (Nginx - Production)
  # ===========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: boilerplate-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3
    networks:
      - boilerplate-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1G

  # ===========================================
  # PostgreSQL Database
  # ===========================================
  db:
    image: postgres:17-alpine
    container_name: boilerplate-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-boilerplate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-boilerplate}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-boilerplate}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - boilerplate-network
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  # ===========================================
  # Redis Cache
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: boilerplate-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - boilerplate-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

networks:
  boilerplate-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
