<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Test</title>
</head>
<body>
    <h1>WebSocket Connection Test</h1>
    <div id="status">Connecting...</div>
    <div id="messages"></div>
    
    <script>
        // Get token from login
        fetch('/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                email: 'admin@example.com',
                password: 'Admin123!'
            })
        })
        .then(r => r.json())
        .then(data => {
            const token = data.access_token;
            document.getElementById('status').textContent = 'Got token: ' + token.substring(0, 30) + '...';
            
            // Connect WebSocket
            const ws = new WebSocket(`ws://localhost:3000/ws?token=${token}`);
            
            ws.onopen = () => {
                document.getElementById('status').textContent = '✅ WebSocket CONNECTED!';
                document.getElementById('status').style.color = 'green';
            };
            
            ws.onmessage = (event) => {
                const div = document.createElement('div');
                div.textContent = '📥 ' + event.data;
                document.getElementById('messages').appendChild(div);
            };
            
            ws.onerror = (error) => {
                document.getElementById('status').textContent = '❌ WebSocket ERROR';
                document.getElementById('status').style.color = 'red';
                console.error('WebSocket error:', error);
            };
            
            ws.onclose = (event) => {
                document.getElementById('status').textContent = '🔴 WebSocket CLOSED: ' + event.code + ' - ' + event.reason;
                document.getElementById('status').style.color = 'orange';
                console.log('WebSocket closed:', event);
            };
        })
        .catch(err => {
            document.getElementById('status').textContent = '❌ Login failed: ' + err.message;
            document.getElementById('status').style.color = 'red';
        });
    </script>
</body>
</html>
